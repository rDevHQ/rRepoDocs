<textarea class="w-full h-[618px] border-none focus:ring-0 font-code-editor text-code-editor text-on-surface bg-transparent resize-none leading-relaxed" spellcheck="false"># System Architecture

The core of rRepoDocs is built on a "Quiet Repository" philosophy. 

## 1. Modular Core
The architecture leverages a three-pane model to isolate file navigation, content editing, and contextual feedback.

## 2. Distributed Sync
All documents are persisted locally first, then synchronized to the primary remote using a conflict-resolution protocol.

## 3. Rendering Engine
Markdown is transformed into editorial-grade typography in real-time within the Preview pane.</textarea>
